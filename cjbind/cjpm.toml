[dependencies]
  cjbind_token = { path = "../cjbind_token" }
  glob = { git = "https://github.com/Zxilly/glob-cj.git", tag = "v0.2.0" }

[package]
  cjc-version = "1.1.3"
  compile-option = "-Woff unused -V"
  link-option = "${LDFLAGS}"
  description = "A simple C binding generator for Cangjie"
  name = "cjbind"
  output-type = "static"
  override-compile-option = ""
  src-dir = ""
  target-dir = ""
  version = "0.3.1"

[profile.customized-option]
  cfg_dynamic_libclang = "--cfg=libclang_linkage=dynamic"
  cfg_opt = "-O2"
  cfg_static_libclang = "--cfg=libclang_linkage=static"
  cfg_verbose = "-V"

[target.x86_64-w64-mingw32.release]
  compile-option = "-O2"

[target.aarch64-apple-darwin.release]
  compile-option = "-O2"

[target.x86_64-unknown-linux-gnu.release]
  compile-option = "-O2"

[target.aarch64-unknown-linux-gnu.release]
  compile-option = "-O2"
