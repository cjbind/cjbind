name: Sync Releases

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (optional, uses latest if not specified)'
        required: false
        type: string

permissions:
  contents: "write"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          python-version: "3.13"
          cache-dependency-glob: "**/*.py.lock"

      - name: Enable TCP BBR
        uses: Zxilly/actions-bbr@c3a8ea7012db3c0f4d5fcf6dd257c28f4cba9ead # v1.0.1

      - name: Download and sync releases
        run: uv run scripts/sync.py ${{ inputs.version || 'latest' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}