name: Test

on:
  workflow_call:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-test:
    name: "Unit / ${{ matrix.os.friendly }}"
    runs-on: ${{ matrix.os.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - runner: ubuntu-22.04
            sys: linux
            arch: x64
            friendly: Linux
          - runner: macos-14
            sys: darwin
            arch: arm64
            friendly: macOS
          - runner: windows-2022
            sys: windows
            arch: x64
            friendly: Windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup test environment
        uses: ./.github/actions/setup-cjbind
        with:
          static-libclang: "true"
          runner-key: ${{ matrix.os.runner }}
          architecture: ${{ matrix.os.arch }}

      - name: Test tokenizer
        run: cjpm test -m cjbind_token -V

      - name: Test generator (Unix)
        if: matrix.os.sys != 'windows'
        shell: bash
        run: uv run python scripts/cjpm.py --static test -m cjbind -V

      - name: Test generator (Windows)
        if: matrix.os.sys == 'windows'
        shell: msys2 {0}
        run: uv run python scripts/cjpm.py --static test -m cjbind -V

  integration-test:
    name: "Integration / ${{ matrix.os.friendly }}"
    runs-on: ${{ matrix.os.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - runner: ubuntu-22.04
            sys: linux
            arch: x64
            friendly: Linux
          - runner: macos-14
            sys: darwin
            arch: arm64
            friendly: macOS
          - runner: windows-2022
            sys: windows
            arch: x64
            friendly: Windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup test environment
        uses: ./.github/actions/setup-cjbind
        with:
          static-libclang: "true"
          runner-key: ${{ matrix.os.runner }}
          architecture: ${{ matrix.os.arch }}

      - name: Test generated bindings (Unix)
        if: matrix.os.sys != 'windows'
        shell: bash
        run: uv run python scripts/cjpm.py --static test -m cjbind_test -V

      - name: Test generated bindings (Windows)
        if: matrix.os.sys == 'windows'
        shell: msys2 {0}
        run: uv run python scripts/cjpm.py --static test -m cjbind_test -V

      - name: Compile generated bindings
        if: matrix.os.sys == 'linux'
        run: uv run python scripts/compile_generated.py

      - name: Run C++ lifecycle integration
        if: matrix.os.sys == 'linux'
        run: uv run python scripts/test_cxx_runtime.py
