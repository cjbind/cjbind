name: Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "${{ matrix.os.friendly }} / ${{ matrix.channel }} / ${{ matrix.linking }}"
    runs-on: ${{ matrix.os.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - runner: ubuntu-22.04
            sys: linux
            arch: x64
            friendly: Linux (x64)
            ext: ""
          - runner: ubuntu-22.04-arm
            sys: linux
            arch: arm64
            friendly: Linux (ARM64)
            ext: ""
          - runner: macos-14
            sys: darwin
            arch: arm64
            friendly: macOS (Apple Silicon)
            ext: ""
          - runner: windows-2022
            sys: windows
            arch: x64
            friendly: Windows (x64)
            ext: .exe
        channel:
          - release
          - debug
        linking:
          - dynamic
          - static

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup build environment
        uses: ./.github/actions/setup-cjbind
        with:
          static-libclang: ${{ matrix.linking == 'static' }}
          runner-key: ${{ matrix.os.runner }}
          architecture: ${{ matrix.os.arch }}

      - name: Install system libclang (Linux)
        if: matrix.linking == 'dynamic' && matrix.os.sys == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev

      - name: Install system libraries (macOS)
        if: matrix.os.sys == 'darwin'
        run: |
          brew install openssl
          echo "DYLD_LIBRARY_PATH=$(brew --prefix openssl)/lib:$DYLD_LIBRARY_PATH" >> "$GITHUB_ENV"
          if [ "${{ matrix.linking }}" = "dynamic" ]; then
            brew install llvm
            echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
          fi

      - name: Build CLI (Unix)
        if: matrix.os.sys != 'windows'
        shell: bash
        run: |
          static_flag=""
          if [ "${{ matrix.linking }}" = "static" ]; then
            static_flag="--static"
          fi
          debug_flag=""
          if [ "${{ matrix.channel }}" = "debug" ]; then
            debug_flag="-g"
          fi
          uv run python scripts/cjpm.py $static_flag build --cfg_verbose -V $debug_flag

      - name: Build CLI (Windows)
        if: matrix.os.sys == 'windows'
        shell: msys2 {0}
        run: |
          static_flag=""
          if [ "${{ matrix.linking }}" = "static" ]; then
            static_flag="--static"
          fi
          debug_flag=""
          if [ "${{ matrix.channel }}" = "debug" ]; then
            debug_flag="-g"
          fi
          uv run python scripts/cjpm.py $static_flag build --cfg_verbose -V $debug_flag

      - name: Enable core dumps (Linux)
        if: matrix.os.sys == 'linux'
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kernel.core_pattern=/tmp/cores/core.%e.%p
          sudo service apport stop 2>/dev/null || true

      - name: Enable core dumps (macOS)
        if: matrix.os.sys == 'darwin'
        run: |
          sudo mkdir -p /tmp/cores
          sudo chmod 1777 /tmp/cores
          sudo sysctl -w kern.corefile=/tmp/cores/core.%P

      - name: Verify built binary (Unix)
        id: verify-binary-unix
        if: matrix.os.sys != 'windows'
        continue-on-error: true
        shell: bash
        run: |
          ulimit -c unlimited
          ./target/${{ matrix.channel }}/bin/cjbind_cli${{ matrix.os.ext }} --version

      - name: Verify built binary (Windows)
        id: verify-binary-windows
        if: matrix.os.sys == 'windows'
        continue-on-error: true
        shell: msys2 {0}
        run: ./target/${{ matrix.channel }}/bin/cjbind_cli${{ matrix.os.ext }} --version

      - name: Collect crash diagnostics (Unix)
        if: steps.verify-binary-unix.outcome == 'failure'
        shell: bash
        run: |
          mkdir -p crash-artifacts
          cp ./target/${{ matrix.channel }}/bin/cjbind_cli${{ matrix.os.ext }} crash-artifacts/ || true
          cp /tmp/cores/core.* crash-artifacts/ 2>/dev/null || true
          if [ "${{ matrix.os.sys }}" = "darwin" ]; then
            cp ~/Library/Logs/DiagnosticReports/cjbind_cli* crash-artifacts/ 2>/dev/null || true
          fi

      - name: Collect crash diagnostics (Windows)
        if: steps.verify-binary-windows.outcome == 'failure'
        shell: msys2 {0}
        run: |
          mkdir -p crash-artifacts
          cp ./target/${{ matrix.channel }}/bin/cjbind_cli.exe crash-artifacts/ || true
          find /c/Users/runneradmin/AppData/Local/CrashDumps -name '*.dmp' -exec cp {} crash-artifacts/ \; 2>/dev/null || true

      - name: Upload crash diagnostics
        if: steps.verify-binary-unix.outcome == 'failure' || steps.verify-binary-windows.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: crash-${{ matrix.os.sys }}-${{ matrix.os.arch }}-${{ matrix.channel }}-${{ matrix.linking }}
          path: crash-artifacts/
          retention-days: 7

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cjbind-${{ matrix.os.sys }}-${{ matrix.os.arch }}-${{ matrix.channel }}-${{ matrix.linking }}
          path: target/${{ matrix.channel }}/bin/cjbind_cli${{ matrix.os.ext }}
          if-no-files-found: error
          retention-days: 7

      - name: Fail on invalid binary
        if: steps.verify-binary-unix.outcome == 'failure' || steps.verify-binary-windows.outcome == 'failure'
        run: exit 1
